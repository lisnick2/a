<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Сапёр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2c3e50;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 10px;
        }

        .header {
            background: #34495e;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .info-box {
            background: #1a1a2e;
            color: #e74c3c;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            min-width: 70px;
            text-align: center;
            font-family: monospace;
        }

        .reset-btn {
            width: 50px;
            height: 50px;
            font-size: 30px;
            border: none;
            border-radius: 10px;
            background: #f39c12;
            cursor: pointer;
        }

        .reset-btn:active {
            background: #e67e22;
        }

        .grid {
            display: grid;
            gap: 2px;
            background: #7f8c8d;
            padding: 5px;
            border-radius: 5px;
            max-width: 100%;
            max-height: 70vh;
        }

        .cell {
            width: 35px;
            height: 35px;
            background: #3498db;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .cell:active {
            background: #2980b9;
        }

        .cell.revealed {
            background: #ecf0f1;
        }

        .cell.mine {
            background: #e74c3c;
        }

        .cell.flagged {
            background: #9b59b6;
        }

        .cell.flagged:after {
            content: "🚩";
        }

        .n1 { color: #3498db; }
        .n2 { color: #27ae60; }
        .n3 { color: #e74c3c; }
        .n4 { color: #8e44ad; }
        .n5 { color: #c0392b; }
        .n6 { color: #16a085; }
        .n7 { color: #2c3e50; }
        .n8 { color: #7f8c8d; }

        .message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .message.hidden {
            display: none;
        }

        .message-text {
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
        }

        .message-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .difficulty {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .diff-btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #95a5a6;
            color: white;
        }

        .diff-btn.active {
            background: #27ae60;
        }

        .instructions {
            color: #bdc3c7;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="difficulty">
            <button class="diff-btn active" onclick="setDifficulty(8,8,10)">Легко</button>
            <button class="diff-btn" onclick="setDifficulty(10,10,20)">Средне</button>
            <button class="diff-btn" onclick="setDifficulty(12,12,35)">Сложно</button>
        </div>

        <div class="header">
            <div class="info-box" id="mineCount">10</div>
            <button class="reset-btn" onclick="resetGame()">😊</button>
            <div class="info-box" id="timer">000</div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="instructions">
            Тап = открыть • Долгий тап = флажок
        </div>
    </div>

    <div class="message hidden" id="message">
        <div class="message-text" id="messageText"></div>
        <button class="message-btn" onclick="resetGame()">Играть снова</button>
    </div>

    <script>
        // Используем var для совместимости со старыми браузерами
        var ROWS = 8;
        var COLS = 8;
        var MINES = 10;
        var grid = [];
        var revealed = [];
        var flagged = [];
        var gameOver = false;
        var firstClick = true;
        var timerInterval = null;
        var seconds = 0;
        var minesLeft = MINES;
        var touchTimer = null;
        var touchMoved = false;

        function setDifficulty(rows, cols, mines) {
            ROWS = rows;
            COLS = cols;
            MINES = mines;

            var btns = document.getElementsByClassName('diff-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].className = 'diff-btn';
            }
            event.target.className = 'diff-btn active';

            resetGame();
        }

        function createGrid() {
            var gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = 'repeat(' + COLS + ', 35px)';

            grid = [];
            revealed = [];
            flagged = [];

            for (var i = 0; i < ROWS; i++) {
                grid[i] = [];
                revealed[i] = [];
                flagged[i] = [];
                for (var j = 0; j < COLS; j++) {
                    grid[i][j] = 0;
                    revealed[i][j] = false;
                    flagged[i][j] = false;

                    var cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.setAttribute('data-row', i);
                    cell.setAttribute('data-col', j);

                    // Touch события
                    cell.addEventListener('touchstart', handleTouchStart, false);
                    cell.addEventListener('touchend', handleTouchEnd, false);
                    cell.addEventListener('touchmove', handleTouchMove, false);

                    // Mouse события для тестирования
                    cell.addEventListener('click', handleClick, false);
                    cell.addEventListener('contextmenu', handleRightClick, false);

                    gridEl.appendChild(cell);
                }
            }
        }

        function placeMines(excludeRow, excludeCol) {
            var placed = 0;
            while (placed < MINES) {
                var r = Math.floor(Math.random() * ROWS);
                var c = Math.floor(Math.random() * COLS);

                // Не ставим мину на первый клик и вокруг него
                if (Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1) {
                    continue;
                }

                if (grid[r][c] !== -1) {
                    grid[r][c] = -1;
                    placed++;
                }
            }

            // Считаем числа
            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (grid[i][j] === -1) continue;

                    var count = 0;
                    for (var di = -1; di <= 1; di++) {
                        for (var dj = -1; dj <= 1; dj++) {
                            var ni = i + di;
                            var nj = j + dj;
                            if (ni >= 0 && ni < ROWS && nj >= 0 && nj < COLS) {
                                if (grid[ni][nj] === -1) count++;
                            }
                        }
                    }
                    grid[i][j] = count;
                }
            }
        }

        function handleTouchStart(e) {
            if (gameOver) return;
            e.preventDefault();
            touchMoved = false;

            var row = parseInt(this.getAttribute('data-row'));
            var col = parseInt(this.getAttribute('data-col'));

            touchTimer = setTimeout(function() {
                if (!touchMoved) {
                    toggleFlag(row, col);
                }
                touchTimer = null;
            }, 500);
        }

        function handleTouchMove(e) {
            touchMoved = true;
            if (touchTimer) {
                clearTimeout(touchTimer);
                touchTimer = null;
            }
        }

        function handleTouchEnd(e) {
            if (gameOver) return;
            e.preventDefault();

            if (touchTimer) {
                clearTimeout(touchTimer);
                touchTimer = null;

                if (!touchMoved) {
                    var row = parseInt(this.getAttribute('data-row'));
                    var col = parseInt(this.getAttribute('data-col'));
                    revealCell(row, col);
                }
            }
        }

        function handleClick(e) {
            if (gameOver) return;
            var row = parseInt(this.getAttribute('data-row'));
            var col = parseInt(this.getAttribute('data-col'));
            revealCell(row, col);
        }

        function handleRightClick(e) {
            e.preventDefault();
            if (gameOver) return;
            var row = parseInt(this.getAttribute('data-row'));
            var col = parseInt(this.getAttribute('data-col'));
            toggleFlag(row, col);
        }

        function toggleFlag(row, col) {
            if (revealed[row][col]) return;

            var cell = getCell(row, col);

            if (flagged[row][col]) {
                flagged[row][col] = false;
                cell.className = 'cell';
                minesLeft++;
            } else {
                flagged[row][col] = true;
                cell.className = 'cell flagged';
                minesLeft--;
            }

            document.getElementById('mineCount').textContent = minesLeft < 10 ? '0' + minesLeft : minesLeft;
        }

        function revealCell(row, col) {
            if (flagged[row][col] || revealed[row][col]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(row, col);
                startTimer();
            }

            revealed[row][col] = true;
            var cell = getCell(row, col);
            cell.className = 'cell revealed';

            if (grid[row][col] === -1) {
                // Мина!
                cell.className = 'cell mine';
                cell.textContent = '💣';
                endGame(false);
                return;
            }

            if (grid[row][col] > 0) {
                cell.textContent = grid[row][col];
                cell.className = 'cell revealed n' + grid[row][col];
            } else {
                // Пустая клетка - открываем соседей
                for (var di = -1; di <= 1; di++) {
                    for (var dj = -1; dj <= 1; dj++) {
                        var ni = row + di;
                        var nj = col + dj;
                        if (ni >= 0 && ni < ROWS && nj >= 0 && nj < COLS) {
                            if (!revealed[ni][nj]) {
                                revealCell(ni, nj);
                            }
                        }
                    }
                }
            }

            checkWin();
        }

        function getCell(row, col) {
            var index = row * COLS + col;
            return document.getElementById('grid').children[index];
        }

        function checkWin() {
            var unrevealed = 0;
            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (!revealed[i][j]) unrevealed++;
                }
            }

            if (unrevealed === MINES) {
                endGame(true);
            }
        }

        function endGame(won) {
            gameOver = true;
            clearInterval(timerInterval);

            document.querySelector('.reset-btn').textContent = won ? '😎' : '😵';

            // Показываем все мины
            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (grid[i][j] === -1 && !revealed[i][j]) {
                        var cell = getCell(i, j);
                        cell.className = won ? 'cell flagged' : 'cell mine';
                        if (!won) cell.textContent = '💣';
                    }
                }
            }

            var msg = document.getElementById('message');
            var msgText = document.getElementById('messageText');
            msgText.textContent = won ? '🎉 Победа!' : '💥 Проигрыш!';
            msg.className = 'message';
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(function() {
                seconds++;
                var display = seconds < 10 ? '00' + seconds : (seconds < 100 ? '0' + seconds : seconds);
                document.getElementById('timer').textContent = display;
            }, 1000);
        }

        function resetGame() {
            gameOver = false;
            firstClick = true;
            minesLeft = MINES;
            seconds = 0;

            if (timerInterval) clearInterval(timerInterval);

            document.getElementById('timer').textContent = '000';
            document.getElementById('mineCount').textContent = MINES < 10 ? '0' + MINES : MINES;
            document.querySelector('.reset-btn').textContent = '😊';
            document.getElementById('message').className = 'message hidden';

            createGrid();
        }

        // Блокировка навигации
        window.onbeforeunload = function() {
            return 'Вы уверены что хотите уйти?';
        };

        // Блокировка свайпов назад
        document.addEventListener('touchmove', function(e) {
            if (e.touches[0].clientX < 20 || e.touches[0].clientX > window.innerWidth - 20) {
                e.preventDefault();
            }
        }, { passive: false });

        // Блокировка зума
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        // Запуск игры
        resetGame();
    </script>
</body>
</html>
