<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Сапёр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2c3e50;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            padding: 10px;
            padding-top: 20px;
        }

        .header {
            background: #34495e;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .info-box {
            background: #1a1a2e;
            color: #e74c3c;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            min-width: 70px;
            text-align: center;
            font-family: monospace;
            display: inline-block;
            vertical-align: middle;
        }

        .reset-btn {
            width: 50px;
            height: 50px;
            font-size: 30px;
            border: none;
            border-radius: 10px;
            background: #f39c12;
            cursor: pointer;
            margin: 0 15px;
            vertical-align: middle;
        }

        .reset-btn:active { background: #e67e22; }

        .grid {
            display: inline-block;
            background: #7f8c8d;
            padding: 5px;
            border-radius: 5px;
        }

        .row {
            white-space: nowrap;
            font-size: 0;
        }

        .cell {
            width: 35px;
            height: 35px;
            background: #3498db;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
            vertical-align: top;
            margin: 1px;
            line-height: 35px;
            text-align: center;
            cursor: pointer;
        }

        .cell:active { background: #2980b9; }
        .cell.revealed { background: #ecf0f1; }
        .cell.mine { background: #e74c3c; }
        .cell.flagged { background: #9b59b6; }

        .n1 { color: #3498db; }
        .n2 { color: #27ae60; }
        .n3 { color: #e74c3c; }
        .n4 { color: #8e44ad; }
        .n5 { color: #c0392b; }
        .n6 { color: #16a085; }
        .n7 { color: #2c3e50; }
        .n8 { color: #7f8c8d; }

        /* === Анимация открытия клетки === */
        @-webkit-keyframes cellPop {
            0% {
                -webkit-transform: scale(0.7);
                transform: scale(0.7);
                background: #f1c40f;
            }
            50% {
                -webkit-transform: scale(1.1);
                transform: scale(1.1);
            }
            100% {
                -webkit-transform: scale(1.0);
                transform: scale(1.0);
            }
        }
        @keyframes cellPop {
            0% {
                transform: scale(0.7);
                background: #f1c40f;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1.0);
            }
        }

        .cell.pop {
            -webkit-animation: cellPop 0.25s ease-out;
            animation: cellPop 0.25s ease-out;
        }

        /* === Анимация установки флажка === */
        @-webkit-keyframes flagBounce {
            0% {
                -webkit-transform: scale(0.5) rotate(-15deg);
                transform: scale(0.5) rotate(-15deg);
            }
            60% {
                -webkit-transform: scale(1.2) rotate(5deg);
                transform: scale(1.2) rotate(5deg);
            }
            100% {
                -webkit-transform: scale(1.0) rotate(0deg);
                transform: scale(1.0) rotate(0deg);
            }
        }
        @keyframes flagBounce {
            0% {
                transform: scale(0.5) rotate(-15deg);
            }
            60% {
                transform: scale(1.2) rotate(5deg);
            }
            100% {
                transform: scale(1.0) rotate(0deg);
            }
        }

        .cell.flagBounce {
            -webkit-animation: flagBounce 0.3s ease-out;
            animation: flagBounce 0.3s ease-out;
        }

        /* === Анимация взрыва мины === */
        @-webkit-keyframes boom {
            0% {
                -webkit-transform: scale(0.3);
                transform: scale(0.3);
                background: #fff;
            }
            40% {
                -webkit-transform: scale(1.3);
                transform: scale(1.3);
                background: #e74c3c;
            }
            100% {
                -webkit-transform: scale(1.0);
                transform: scale(1.0);
            }
        }
        @keyframes boom {
            0% {
                transform: scale(0.3);
                background: #fff;
            }
            40% {
                transform: scale(1.3);
                background: #e74c3c;
            }
            100% {
                transform: scale(1.0);
            }
        }

        .cell.boom {
            -webkit-animation: boom 0.4s ease-out;
            animation: boom 0.4s ease-out;
        }

        /* === Экран сообщения === */
        .message {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            text-align: center;
            padding-top: 180px;
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        .message.show { display: block; }

        #fx {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 101;
            pointer-events: none;
        }

        .message-text {
            position: relative;
            z-index: 102;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.45);
        }

        .message-text.win { color: #2ecc71; }
        .message-text.lose { color: #e74c3c; }

        @-webkit-keyframes pop {
            0% { -webkit-transform: scale(0.9); opacity: 0.0; }
            40% { -webkit-transform: scale(1.10); opacity: 1; }
            100% { -webkit-transform: scale(1.0); opacity: 1; }
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0.0; }
            40% { transform: scale(1.10); opacity: 1; }
            100% { transform: scale(1.0); opacity: 1; }
        }

        @-webkit-keyframes shake {
            0% { -webkit-transform: translate(0,0); }
            15% { -webkit-transform: translate(-4px,0); }
            30% { -webkit-transform: translate(4px,0); }
            45% { -webkit-transform: translate(-3px,0); }
            60% { -webkit-transform: translate(3px,0); }
            75% { -webkit-transform: translate(-2px,0); }
            100% { -webkit-transform: translate(0,0); }
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            15% { transform: translate(-4px,0); }
            30% { transform: translate(4px,0); }
            45% { transform: translate(-3px,0); }
            60% { transform: translate(3px,0); }
            75% { transform: translate(-2px,0); }
            100% { transform: translate(0,0); }
        }

        .textPop {
            -webkit-animation: pop 0.55s ease-out;
            animation: pop 0.55s ease-out;
        }
        .textShake {
            -webkit-animation: shake 0.6s ease-in-out;
            animation: shake 0.6s ease-in-out;
        }

        .message-btn {
            position: relative;
            z-index: 102;
            padding: 15px 40px;
            font-size: 24px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .difficulty { margin-bottom: 15px; }

        .diff-btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #95a5a6;
            color: white;
            margin: 3px;
        }
        .diff-btn.active { background: #27ae60; }

        .instructions {
            color: #bdc3c7;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="difficulty">
            <button class="diff-btn active" id="diff1" onclick="setDifficulty(8,8,10,this)">Легко</button>
            <button class="diff-btn" id="diff2" onclick="setDifficulty(10,10,20,this)">Средне</button>
            <button class="diff-btn" id="diff3" onclick="setDifficulty(12,12,35,this)">Сложно</button>
        </div>

        <div class="header">
            <span class="info-box" id="mineCount">10</span>
            <button class="reset-btn" onclick="resetGame()">😊</button>
            <span class="info-box" id="timer">000</span>
        </div>

        <div class="grid" id="grid"></div>

        <div class="instructions">
            Тап = открыть • Долгий тап = флажок
        </div>
    </div>

    <div class="message" id="message">
        <canvas id="fx"></canvas>
        <div class="message-text" id="messageText"></div>
        <button class="message-btn" onclick="resetGame()">Играть снова</button>
    </div>

    <script>
        var ROWS = 8;
        var COLS = 8;
        var MINES = 10;

        var grid = [];
        var revealed = [];
        var flagged = [];
        var gameOver = false;
        var firstClick = true;

        var timerInterval = null;
        var seconds = 0;
        var minesLeft = MINES;

        var touchTimer = null;
        var touchMoved = false;

        // ====== Fireworks (canvas) ======
        var fxCanvas = document.getElementById('fx');
        var fxCtx = fxCanvas.getContext('2d');
        var fxRAF = null;

        function stopFireworks() {
            if (fxRAF) {
                try { cancelAnimationFrame(fxRAF); } catch(e){}
                fxRAF = null;
            }
            try { fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height); } catch(e){}
        }

        function startFireworks() {
            stopFireworks();

            var w = window.innerWidth || 320;
            var h = window.innerHeight || 480;
            var dpr = window.devicePixelRatio || 1;
            if (dpr > 2) dpr = 2;

            fxCanvas.width = Math.floor(w * dpr);
            fxCanvas.height = Math.floor(h * dpr);
            fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            fxCtx.clearRect(0, 0, w, h);

            var particles = [];
            var startTime = Date.now();
            var duration = 1400;

            var centerX = w * 0.5;
            var baseY = h * 0.35;
            var bursts = 30;
            var perBurst = 18;
            var gravity = 0.08;

            function rand(min, max) {
                return min + Math.random() * (max - min);
            }

            function pickColor() {
                var colors = ['#2ecc71', '#7CFFB2', '#F1C40F', '#FFFFFF', '#3498db', '#e74c3c'];
                return colors[(Math.random() * colors.length) | 0];
            }

            for (var b = 0; b < bursts; b++) {
                var bx = centerX + rand(-w*0.22, w*0.22);
                var by = baseY + rand(-h*0.15, h*0.12);
                var baseAngle = rand(0, Math.PI * 2);

                for (var i = 0; i < perBurst; i++) {
                    var ang = baseAngle + rand(-Math.PI, Math.PI);
                    var speed = rand(2.5, 6.0);

                    particles.push({
                        x: bx,
                        y: by,
                        vx: Math.cos(ang) * speed,
                        vy: Math.sin(ang) * speed,
                        g: gravity * rand(0.9, 1.3),
                        life: rand(45, 90),
                        decay: rand(0.91, 0.97),
                        size: rand(1.5, 3.0),
                        color: pickColor(),
                        a: 1
                    });
                }
            }

            function draw() {
                var now = Date.now();
                if (now - startTime > duration) {
                    stopFireworks();
                    return;
                }

                fxCtx.clearRect(0, 0, w, h);

                for (var p = 0; p < particles.length; p++) {
                    var pt = particles[p];
                    pt.vy += pt.g;
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.life -= 1;
                    pt.a *= pt.decay;

                    if (pt.a < 0.02 || pt.life <= 0) continue;

                    fxCtx.globalAlpha = pt.a;
                    fxCtx.fillStyle = pt.color;
                    fxCtx.beginPath();
                    fxCtx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
                    fxCtx.fill();
                }

                fxCtx.globalAlpha = 1;
                fxRAF = requestAnimationFrame(draw);
            }

            fxRAF = requestAnimationFrame(draw);
        }

        // ====== Game ======
        function setDifficulty(rows, cols, mines, btn) {
            ROWS = rows;
            COLS = cols;
            MINES = mines;

            document.getElementById('diff1').className = 'diff-btn';
            document.getElementById('diff2').className = 'diff-btn';
            document.getElementById('diff3').className = 'diff-btn';
            btn.className = 'diff-btn active';

            resetGame();
        }

        function createGrid() {
            var gridEl = document.getElementById('grid');
            var html = '';

            grid = [];
            revealed = [];
            flagged = [];

            for (var i = 0; i < ROWS; i++) {
                grid[i] = [];
                revealed[i] = [];
                flagged[i] = [];

                html += '<div class="row">';

                for (var j = 0; j < COLS; j++) {
                    grid[i][j] = 0;
                    revealed[i][j] = false;
                    flagged[i][j] = false;

                    html += '<span class="cell" data-row="' + i + '" data-col="' + j + '"></span>';
                }

                html += '</div>';
            }

            gridEl.innerHTML = html;

            var cells = gridEl.getElementsByClassName('cell');
            for (var k = 0; k < cells.length; k++) addCellEvents(cells[k]);
        }

        function addCellEvents(cell) {
            cell.ontouchstart = function(e) {
                if (gameOver) return;
                e.preventDefault();

                touchMoved = false;
                touchTimer = null;

                var row = parseInt(this.getAttribute('data-row'));
                var col = parseInt(this.getAttribute('data-col'));

                touchTimer = setTimeout(function() {
                    toggleFlag(row, col);
                    touchTimer = null;
                }, 500);
            };

            cell.ontouchmove = function(e) {
                touchMoved = true;
                if (touchTimer) {
                    clearTimeout(touchTimer);
                    touchTimer = null;
                }
            };

            cell.ontouchend = function(e) {
                if (gameOver) return;
                e.preventDefault();

                if (touchTimer) {
                    clearTimeout(touchTimer);
                    touchTimer = null;

                    if (!touchMoved) {
                        var row = parseInt(this.getAttribute('data-row'));
                        var col = parseInt(this.getAttribute('data-col'));
                        revealCell(row, col);
                    }
                }
            };

            cell.onclick = function(e) {
                if (gameOver) return;
                var row = parseInt(this.getAttribute('data-row'));
                var col = parseInt(this.getAttribute('data-col'));
                revealCell(row, col);
            };

            cell.oncontextmenu = function(e) {
                e.preventDefault();
                if (gameOver) return;
                var row = parseInt(this.getAttribute('data-row'));
                var col = parseInt(this.getAttribute('data-col'));
                toggleFlag(row, col);
                return false;
            };
        }

        function placeMines(excludeRow, excludeCol) {
            var placed = 0;

            while (placed < MINES) {
                var r = Math.floor(Math.random() * ROWS);
                var c = Math.floor(Math.random() * COLS);

                if (Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1) continue;

                if (grid[r][c] !== -1) {
                    grid[r][c] = -1;
                    placed++;
                }
            }

            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (grid[i][j] === -1) continue;

                    var count = 0;
                    for (var di = -1; di <= 1; di++) {
                        for (var dj = -1; dj <= 1; dj++) {
                            var ni = i + di;
                            var nj = j + dj;
                            if (ni >= 0 && ni < ROWS && nj >= 0 && nj < COLS) {
                                if (grid[ni][nj] === -1) count++;
                            }
                        }
                    }
                    grid[i][j] = count;
                }
            }
        }

        function getCell(row, col) {
            var rows = document.getElementById('grid').getElementsByClassName('row');
            var cells = rows[row].getElementsByClassName('cell');
            return cells[col];
        }

        function toggleFlag(row, col) {
            if (revealed[row][col]) return;

            var cell = getCell(row, col);

            if (flagged[row][col]) {
                flagged[row][col] = false;
                cell.className = 'cell';
                cell.innerHTML = '';
                minesLeft++;
            } else {
                flagged[row][col] = true;
                cell.className = 'cell flagged flagBounce';
                cell.innerHTML = '🚩';
                minesLeft--;
            }

            updateMineCount();
        }

        function revealCell(row, col) {
            if (flagged[row][col] || revealed[row][col]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(row, col);
                startTimer();
            }

            revealed[row][col] = true;

            var cell = getCell(row, col);

            if (grid[row][col] === -1) {
                // Мина - взрыв!
                cell.className = 'cell mine boom';
                cell.innerHTML = '💣';
                endGame(false);
                return;
            }

            // Обычная клетка - pop анимация
            if (grid[row][col] > 0) {
                cell.innerHTML = grid[row][col];
                cell.className = 'cell revealed pop n' + grid[row][col];
            } else {
                cell.className = 'cell revealed pop';

                // Открываем соседей с небольшой задержкой для эффекта "волны"
                for (var di = -1; di <= 1; di++) {
                    for (var dj = -1; dj <= 1; dj++) {
                        var ni = row + di;
                        var nj = col + dj;
                        if (ni >= 0 && ni < ROWS && nj >= 0 && nj < COLS) {
                            if (!revealed[ni][nj]) {
                                revealCell(ni, nj);
                            }
                        }
                    }
                }
            }

            checkWin();
        }

        function checkWin() {
            var unrevealed = 0;
            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (!revealed[i][j]) unrevealed++;
                }
            }
            if (unrevealed === MINES) endGame(true);
        }

        function endGame(won) {
            gameOver = true;

            if (timerInterval) clearInterval(timerInterval);

            stopFireworks();

            document.getElementsByClassName('reset-btn')[0].innerHTML = won ? '😎' : '😵';

            // Показываем все мины
            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (grid[i][j] === -1 && !revealed[i][j]) {
                        var cell = getCell(i, j);
                        if (won) {
                            cell.className = 'cell flagged';
                            cell.innerHTML = '🚩';
                        } else {
                            cell.className = 'cell mine';
                            cell.innerHTML = '💣';
                        }
                    }
                }
            }

            var msg = document.getElementById('message');
            var msgText = document.getElementById('messageText');

            if (won) {
                msgText.innerHTML = '🎉 Победа! 🎉';
                msgText.className = 'message-text win textPop';
                setTimeout(function() {
                    startFireworks();
                }, 100);
            } else {
                msgText.innerHTML = '💥 Проигрыш! 💥';
                msgText.className = 'message-text lose textShake';
            }

            msg.className = 'message show';
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(function() {
                seconds++;
                var s = String(seconds);
                while (s.length < 3) s = '0' + s;
                document.getElementById('timer').innerHTML = s;
            }, 1000);
        }

        function updateMineCount() {
            var s = String(minesLeft);
            if (s.length < 2) s = '0' + s;
            document.getElementById('mineCount').innerHTML = s;
        }

        function resetGame() {
            gameOver = false;
            firstClick = true;

            minesLeft = MINES;
            seconds = 0;

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;

            stopFireworks();

            document.getElementById('timer').innerHTML = '000';
            updateMineCount();

            document.getElementsByClassName('reset-btn')[0].innerHTML = '😊';

            var msg = document.getElementById('message');
            msg.className = 'message';

            createGrid();
        }

        window.onbeforeunload = function() {
            return 'Уйти?';
        };

        resetGame();
    </script>
</body>
</html>
