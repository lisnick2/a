<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Сапёр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2c3e50;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            padding: 10px;
            padding-top: 20px;
        }

        .header {
            background: #34495e;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .info-box {
            background: #1a1a2e;
            color: #e74c3c;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            min-width: 70px;
            text-align: center;
            font-family: monospace;
            display: inline-block;
            vertical-align: middle;
        }

        .reset-btn {
            width: 50px;
            height: 50px;
            font-size: 30px;
            border: none;
            border-radius: 10px;
            background: #f39c12;
            cursor: pointer;
            margin: 0 15px;
            vertical-align: middle;
        }

        .reset-btn:active { background: #e67e22; }

        .grid {
            display: inline-block;
            background: #7f8c8d;
            padding: 5px;
            border-radius: 5px;
        }

        .row {
            white-space: nowrap;
            font-size: 0;
        }

        .cell {
            width: 35px;
            height: 35px;
            background: #3498db;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
            vertical-align: top;
            margin: 1px;
            line-height: 35px;
            text-align: center;
            cursor: pointer;
        }

        .cell:active { background: #2980b9; }
        .cell.revealed { background: #ecf0f1; }
        .cell.mine { background: #e74c3c; }
        .cell.flagged { background: #9b59b6; }

        .n1 { color: #3498db; }
        .n2 { color: #27ae60; }
        .n3 { color: #e74c3c; }
        .n4 { color: #8e44ad; }
        .n5 { color: #c0392b; }
        .n6 { color: #16a085; }
        .n7 { color: #2c3e50; }
        .n8 { color: #7f8c8d; }

        .message {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); /* прозрачнее */
            text-align: center;
            padding-top: 180px;
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        .message.show { display: block; }

        /* Canvas для фейерверков */
        #fx {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 101;
            pointer-events: none;
        }

        .message-text {
            position: relative;
            z-index: 102;
            font-size: 48px; /* больше */
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.45);
        }

        .message-text.win { color: #2ecc71; }
        .message-text.lose { color: #e74c3c; }

        /* Короткие анимации (немного “эффекта”, но не долго) */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0.0; }
            40% { transform: scale(1.10); opacity: 1; }
            100% { transform: scale(1.0); opacity: 1; }
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            15% { transform: translate(-3px,0); }
            30% { transform: translate(3px,0); }
            45% { transform: translate(-2px,0); }
            60% { transform: translate(2px,0); }
            75% { transform: translate(-1px,0); }
            100% { transform: translate(0,0); }
        }

        .pop { animation: pop 0.55s ease-out; }
        .shake { animation: shake 0.6s ease-in-out; }

        .message-btn {
            position: relative;
            z-index: 102;
            padding: 15px 40px;
            font-size: 24px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .difficulty { margin-bottom: 15px; }

        .diff-btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #95a5a6;
            color: white;
            margin: 3px;
        }
        .diff-btn.active { background: #27ae60; }

        .instructions {
            color: #bdc3c7;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="difficulty">
            <button class="diff-btn active" id="diff1" onclick="setDifficulty(8,8,10,this)">Легко</button>
            <button class="diff-btn" id="diff2" onclick="setDifficulty(10,10,20,this)">Средне</button>
            <button class="diff-btn" id="diff3" onclick="setDifficulty(12,12,35,this)">Сложно</button>
        </div>

        <div class="header">
            <span class="info-box" id="mineCount">10</span>
            <button class="reset-btn" onclick="resetGame()">😊</button>
            <span class="info-box" id="timer">000</span>
        </div>

        <div class="grid" id="grid"></div>

        <div class="instructions">
            Тап = открыть • Долгий тап = флажок
        </div>
    </div>

    <div class="message" id="message">
        <canvas id="fx"></canvas>
        <div class="message-text" id="messageText"></div>
        <button class="message-btn" onclick="resetGame()">Играть снова</button>
    </div>

    <script>
        var ROWS = 8;
        var COLS = 8;
        var MINES = 10;

        var grid = [];
        var revealed = [];
        var flagged = [];
        var gameOver = false;
        var firstClick = true;

        var timerInterval = null;
        var seconds = 0;
        var minesLeft = MINES;

        var touchTimer = null;
        var touchMoved = false;

        // ====== Fireworks (canvas) ======
        var fxCanvas = document.getElementById('fx');
        var fxCtx = fxCanvas.getContext('2d');

        var fxRAF = null;
        var fxStart = 0;

        function stopFireworks() {
            if (fxRAF) {
                try { cancelAnimationFrame(fxRAF); } catch(e){}
                fxRAF = null;
            }
            try { fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height); } catch(e){}
        }

        function startFireworks() {
            stopFireworks();

            var w = window.innerWidth || 320;
            var h = window.innerHeight || 480;
            var dpr = window.devicePixelRatio || 1;

            // Чтобы работало и на старых iPad 2, не делаем слишком много DPI
            if (dpr > 2) dpr = 2;

            fxCanvas.width = Math.floor(w * dpr);
            fxCanvas.height = Math.floor(h * dpr);

            // Координаты в CSS пикселях
            fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            fxCtx.clearRect(0, 0, w, h);

            var particles = [];
            var startTime = Date.now();
            fxStart = startTime;

            var duration = 1200; // коротко

            var centerX = w * 0.5;
            var baseY = h * 0.35;

            // “побольше”
            var bursts = 26;        // больше разрывов
            var perBurst = 16;     // больше частиц
            var gravity = 0.08;

            function rand(min, max) {
                return min + Math.random() * (max - min);
            }

            function pickColor() {
                // зелёно-белые и жёлтые оттенки
                var colors = ['#2ecc71', '#7CFFB2', '#F1C40F', '#FFFFFF'];
                return colors[(Math.random() * colors.length) | 0];
            }

            for (var b = 0; b < bursts; b++) {
                var bx = centerX + rand(-w*0.18, w*0.18);
                var by = baseY + rand(-h*0.12, h*0.10);

                // Направление: часть вверх/в стороны
                var baseAngle = rand(Math.PI * 0.85, Math.PI * 2.15);

                for (var i = 0; i < perBurst; i++) {
                    var ang = baseAngle + rand(-Math.PI/2, Math.PI/2);
                    var speed = rand(2.2, 5.6);

                    particles.push({
                        x: bx,
                        y: by,
                        vx: Math.cos(ang) * speed,
                        vy: Math.sin(ang) * speed,
                        g: gravity * rand(0.9, 1.25),
                        life: rand(40, 85),     // количество кадров “жизни”
                        decay: rand(0.90, 0.97),
                        size: rand(1.2, 2.4),
                        color: pickColor(),
                        a: 1
                    });
                }
            }

            function draw() {
                var now = Date.now();
                if (now - startTime > duration) {
                    stopFireworks();
                    return;
                }

                fxCtx.clearRect(0, 0, w, h);

                for (var p = 0; p < particles.length; p++) {
                    var pt = particles[p];

                    pt.vy += pt.g;
                    pt.x += pt.vx;
                    pt.y += pt.vy;

                    pt.life -= 1;
                    pt.a *= pt.decay;

                    if (pt.a < 0.02 || pt.life <= 0) continue;

                    fxCtx.globalAlpha = pt.a;

                    // Рисуем “точки”
                    fxCtx.fillStyle = pt.color;
                    fxCtx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);

                    // Лёгкий “след” — короткая линия
                    fxCtx.globalAlpha = pt.a * 0.7;
                    fxCtx.fillRect(pt.x - pt.vx*0.12, pt.y - pt.vy*0.12, 1, 1);
                }

                fxCtx.globalAlpha = 1;

                fxRAF = requestAnimationFrame(draw);
            }

            fxRAF = requestAnimationFrame(draw);
        }

        // ====== Game ======
        function setDifficulty(rows, cols, mines, btn) {
            ROWS = rows;
            COLS = cols;
            MINES = mines;

            document.getElementById('diff1').className = 'diff-btn';
            document.getElementById('diff2').className = 'diff-btn';
            document.getElementById('diff3').className = 'diff-btn';
            btn.className = 'diff-btn active';

            resetGame();
        }

        function createGrid() {
            var gridEl = document.getElementById('grid');
            var html = '';

            grid = [];
            revealed = [];
            flagged = [];

            for (var i = 0; i < ROWS; i++) {
                grid[i] = [];
                revealed[i] = [];
                flagged[i] = [];

                html += '<div class="row">';

                for (var j = 0; j < COLS; j++) {
                    grid[i][j] = 0;
                    revealed[i][j] = false;
                    flagged[i][j] = false;

                    html += '<span class="cell" data-row="' + i + '" data-col="' + j + '"></span>';
                }

                html += '</div>';
            }

            gridEl.innerHTML = html;

            var cells = gridEl.getElementsByClassName('cell');
            for (var k = 0; k < cells.length; k++) addCellEvents(cells[k]);
        }

        function addCellEvents(cell) {
            cell.ontouchstart = function(e) {
                if (gameOver) return;
                e.preventDefault();

                touchMoved = false;
                touchTimer = null;

                var row = parseInt(this.getAttribute('data-row'));
                var col = parseInt(this.getAttribute('data-col'));
                var self = this;

                touchTimer = setTimeout(function() {
                    // долгий тап = флажок
                    toggleFlag(row, col);
                    touchTimer = null;
                }, 500);
            };

            cell.ontouchmove = function(e) {
                touchMoved = true;
                if (touchTimer) {
                    clearTimeout(touchTimer);
                    touchTimer = null;
                }
            };

            cell.ontouchend = function(e) {
                if (gameOver) return;
                e.preventDefault();

                // Если тап был короткий — открываем
                if (touchTimer) {
                    clearTimeout(touchTimer);
                    touchTimer = null;

                    if (!touchMoved) {
                        var row = parseInt(this.getAttribute('data-row'));
                        var col = parseInt(this.getAttribute('data-col'));
                        revealCell(row, col);
                    }
                }
            };

            // для ПК/тестов
            cell.onclick = function(e) {
                if (gameOver) return;
                var row = parseInt(this.getAttribute('data-row'));
                var col = parseInt(this.getAttribute('data-col'));
                revealCell(row, col);
            };

            cell.oncontextmenu = function(e) {
                e.preventDefault();
                if (gameOver) return;
                var row = parseInt(this.getAttribute('data-row'));
                var col = parseInt(this.getAttribute('data-col'));
                toggleFlag(row, col);
                return false;
            };
        }

        function placeMines(excludeRow, excludeCol) {
            var placed = 0;

            while (placed < MINES) {
                var r = Math.floor(Math.random() * ROWS);
                var c = Math.floor(Math.random() * COLS);

                if (Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1) continue;

                if (grid[r][c] !== -1) {
                    grid[r][c] = -1;
                    placed++;
                }
            }

            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (grid[i][j] === -1) continue;

                    var count = 0;
                    for (var di = -1; di <= 1; di++) {
                        for (var dj = -1; dj <= 1; dj++) {
                            var ni = i + di;
                            var nj = j + dj;
                            if (ni >= 0 && ni < ROWS && nj >= 0 && nj < COLS) {
                                if (grid[ni][nj] === -1) count++;
                            }
                        }
                    }
                    grid[i][j] = count;
                }
            }
        }

        function getCell(row, col) {
            var rows = document.getElementById('grid').getElementsByClassName('row');
            var cells = rows[row].getElementsByClassName('cell');
            return cells[col];
        }

        function toggleFlag(row, col) {
            if (revealed[row][col]) return;

            var cell = getCell(row, col);

            if (flagged[row][col]) {
                flagged[row][col] = false;
                cell.className = 'cell';
                cell.innerHTML = '';
                minesLeft++;
            } else {
                flagged[row][col] = true;
                cell.className = 'cell flagged';
                cell.innerHTML = '🚩';
                minesLeft--;
            }

            updateMineCount();
        }

        function revealCell(row, col) {
            if (flagged[row][col] || revealed[row][col]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(row, col);
                startTimer();
            }

            revealed[row][col] = true;

            var cell = getCell(row, col);
            cell.className = 'cell revealed';

            if (grid[row][col] === -1) {
                cell.className = 'cell mine';
                cell.innerHTML = '💣';
                endGame(false);
                return;
            }

            if (grid[row][col] > 0) {
                cell.innerHTML = grid[row][col];
                cell.className = 'cell revealed n' + grid[row][col];
            } else {
                for (var di = -1; di <= 1; di++) {
                    for (var dj = -1; dj <= 1; dj++) {
                        var ni = row + di;
                        var nj = col + dj;
                        if (ni >= 0 && ni < ROWS && nj >= 0 && nj < COLS) {
                            if (!revealed[ni][nj]) revealCell(ni, nj);
                        }
                    }
                }
            }

            checkWin();
        }

        function checkWin() {
            var unrevealed = 0;
            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (!revealed[i][j]) unrevealed++;
                }
            }
            if (unrevealed === MINES) endGame(true);
        }

        function endGame(won) {
            gameOver = true;

            if (timerInterval) clearInterval(timerInterval);

            stopFireworks(); // на всякий случай

            document.getElementsByClassName('reset-btn')[0].innerHTML = won ? '😎' : '😵';

            for (var i = 0; i < ROWS; i++) {
                for (var j = 0; j < COLS; j++) {
                    if (grid[i][j] === -1 && !revealed[i][j]) {
                        var cell = getCell(i, j);
                        if (won) {
                            cell.className = 'cell flagged';
                            cell.innerHTML = '🚩';
                        } else {
                            cell.className = 'cell mine';
                            cell.innerHTML = '💣';
                        }
                    }
                }
            }

            var msg = document.getElementById('message');
            var msgText = document.getElementById('messageText');

            if (won) {
                msgText.innerHTML = '🎉 Победа! 🎉';
                msgText.className = 'message-text win pop';
            } else {
                msgText.innerHTML = '💥 Проигрыш! 💥';
                msgText.className = 'message-text lose shake';
            }

            msg.className = 'message show';

            // Фейерверки только при победе
            if (won) startFireworks();
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(function() {
                seconds++;
                var s = String(seconds);
                while (s.length < 3) s = '0' + s;
                document.getElementById('timer').innerHTML = s;
            }, 1000);
        }

        function updateMineCount() {
            var s = String(minesLeft);
            if (s.length < 2) s = '0' + s;
            document.getElementById('mineCount').innerHTML = s;
        }

        function resetGame() {
            gameOver = false;
            firstClick = true;

            minesLeft = MINES;
            seconds = 0;

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;

            stopFireworks();

            document.getElementById('timer').innerHTML = '000';
            updateMineCount();

            document.getElementsByClassName('reset-btn')[0].innerHTML = '😊';

            var msg = document.getElementById('message');
            msg.className = 'message';

            createGrid();
        }

        window.onbeforeunload = function() {
            return 'Уйти?';
        };

        resetGame();
    </script>
</body>
</html>
